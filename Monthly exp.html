<!DOCTYPE html>
<html>
<head>
<title>Special Question ❤️</title>

<style>
body {
    text-align: center;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    height: 100vh;
    overflow: hidden;
}

h1 {
    margin-top: 100px;
    font-size: 28px;
    color: #fff;
}

button {
    padding: 12px 25px;
    font-size: 18px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    margin: 20px;
    transition: 0.3s;
}

#yesBtn {
    background-color: #28a745;
    color: white;
}

#noBtn {
    background-color: #dc3545;
    color: white;
    position: absolute;
}
</style>

</head>
<body>

<h1>Will you go on a date with me? 💖</h1>

<button id="yesBtn" onclick="showMessage()">Yes 😍</button>
<button id="noBtn" onmouseover="moveButton()">No 😜</button>

<script>
function showMessage() {
    document.body.innerHTML = "<h1 style='color:white;margin-top:150px;'>Yayyyy ❤️ I can't wait to see you! 😘</h1>";
}

function moveButton() {
    var button = document.getElementById("noBtn");
    var x = Math.random() * (window.innerWidth - 100);
    var y = Math.random() * (window.innerHeight - 50);
    button.style.left = x + "px";
    button.style.top = y + "px";
}
</script>

</body>
</html>
